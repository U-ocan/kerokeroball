<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KerokeroBall - Frog Edition</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { background: #87ceeb; border: 8px solid #27ae60; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); max-width: 100%; max-height: 90vh; }
        #ui { position: absolute; top: 20px; color: white; text-align: center; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="margin:0">KerokeroBall</h1>
        <p>カエルのバンパーを実装しました！</p>
        <div id="score">Score: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = 400;
        canvas.height = 600;

        const gravity = 0.42; 
        const decay = 0.85;   
        let score = 0;

        // 画像の読み込み設定
        const frogImg = new Image();
        frogImg.src = 'https://raw.githubusercontent.com/U-ocan/kerokeroball/main/frog.PNG'; // 送っていただいたカエル画像
        let imgLoaded = false;
        frogImg.onload = () => { imgLoaded = true; };

        const ball = {
            x: 200, y: -50, vx: 2, vy: 0, radius: 15, color: '#ffffff'
        };

        class Flipper {
            constructor(x, y, length, angle, side) {
                this.x = x; this.y = y; this.length = length;
                this.baseAngle = angle; this.angle = angle;
                this.side = side;
                this.targetAngle = angle;
            }
            update() {
                this.angle += (this.targetAngle - this.angle) * 0.45;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = '#27ae60';
                ctx.beginPath();
                ctx.roundRect(0, -12, this.length * this.side, 24, 12);
                ctx.fill();
                ctx.restore();
            }
        }

        const flipY = 510;
        const leftFlipper = new Flipper(85, flipY, 100, 0.6, 1);
        const rightFlipper = new Flipper(315, flipY, 100, -0.6, -1);

        const bumpers = [
            { x: 100, y: 150, r: 35 },
            { x: 300, y: 150, r: 35 },
            { x: 200, y: 280, r: 45 }
        ];

        const slingTop = flipY - 105;

        // バンパー描画関数を更新
        function drawFrogBumper(b) {
            if (imgLoaded) {
                // 画像を円のサイズ（半径 * 2）に合わせて描画
                const size = b.r * 2.2; // 少し大きめに表示してイラストの端まで見せる
                ctx.drawImage(frogImg, b.x - size/2, b.y - size/2, size, size);
            } else {
                // 画像読み込み前のフォールバック（従来の円形）
                ctx.fillStyle = '#2ecc71';
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
            }
        }

        function resetBall() {
            ball.x = 200; ball.y = -30;
            ball.vx = (Math.random() - 0.5) * 8;
            ball.vy = 2;
        }

        function update() {
            ball.vy += gravity;
            ball.x += ball.vx;
            ball.y += ball.vy;

            ball.vx *= 0.998;
            ball.vy *= 0.998;

            if (ball.x < ball.radius && ball.y < slingTop) { ball.vx *= -0.7; ball.x = ball.radius; }
            if (ball.x > canvas.width - ball.radius && ball.y < slingTop) { ball.vx *= -0.7; ball.x = canvas.width - ball.radius; }
            if (ball.y < ball.radius && ball.y > -100) { ball.vy *= -0.7; ball.y = ball.radius; }

            bumpers.forEach(b => {
                const dx = ball.x - b.x; const dy = ball.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ball.radius + b.r) {
                    const angle = Math.atan2(dy, dx);
                    const speed = Math.sqrt(ball.vx**2 + ball.vy**2);
                    const newSpeed = Math.max(speed * decay, 9); 
                    ball.vx = Math.cos(angle) * newSpeed;
                    ball.vy = Math.sin(angle) * newSpeed;
                    score += 10; scoreEl.innerText = `Score: ${score}`;
                }
            });

            const slingshots = [{isLeft:true, x:0}, {isLeft:false, x:400}];
            slingshots.forEach(s => {
                if (ball.y >= slingTop && ball.y <= flipY) {
                    const progress = (ball.y - slingTop) / (flipY - slingTop);
                    const slopeX = s.isLeft ? (progress * 85) : 400 - (progress * 85);
                    if (s.isLeft && ball.x - ball.radius < slopeX) {
                        ball.vx = 10 * decay; ball.vy = -6 * decay; ball.x = slopeX + ball.radius;
                        score += 5;
                    } else if (!s.isLeft && ball.x + ball.radius > slopeX) {
                        ball.vx = -10 * decay; ball.vy = -6 * decay; ball.x = slopeX - ball.radius;
                        score += 5;
                    }
                    scoreEl.innerText = `Score: ${score}`;
                }
            });

            [leftFlipper, rightFlipper].forEach(f => {
                f.update();
                const dx = ball.x - f.x;
                const dy = ball.y - f.y;
                const cos = Math.cos(-f.angle);
                const sin = Math.sin(-f.angle);
                const rx = dx * cos - dy * sin;
                const ry = dx * sin + dy * cos;

                if (rx * f.side > -10 && rx * f.side < f.length + 10 && Math.abs(ry) < ball.radius + 15) {
                    if (Math.abs(f.targetAngle - f.angle) > 0.02) {
                        ball.vy = -20;
                        ball.vx = (ball.x - f.x) * 0.35;
                        ball.y = f.y - 45;
                    } else if (ry < 0) {
                        ball.vy *= -0.3;
                        ball.vx *= 0.5;
                        ball.y = f.y - 25;
                    }
                }
            });

            if (ball.y > canvas.height + 100) {
                score = 0; scoreEl.innerText = `Score: ${score}`;
                resetBall();
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#218c74';
            ctx.beginPath(); ctx.ellipse(200, 595, 280, 60, 0, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#27ae60';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            [ {p1:{x:0, y:slingTop}, p2:{x:85, y:flipY}, p3:{x:0, y:flipY}},
              {p1:{x:400, y:slingTop}, p2:{x:315, y:flipY}, p3:{x:400, y:flipY}}
            ].forEach(s => {
                ctx.beginPath(); ctx.moveTo(s.p1.x, s.p1.y); ctx.lineTo(s.p2.x, s.p2.y); ctx.lineTo(s.p3.x, s.p3.y); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo(s.p1.x, s.p1.y); ctx.lineTo(s.p2.x, s.p2.y); ctx.stroke();
            });

            bumpers.forEach(drawFrogBumper);
            leftFlipper.draw();
            rightFlipper.draw();
            
            ctx.fillStyle = ball.color;
            ctx.shadowBlur = 15; ctx.shadowColor = "rgba(255,255,255,0.6)";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        const handleInput = (side, active) => {
            if (side === 'left') leftFlipper.targetAngle = active ? -0.6 : 0.6;
            if (side === 'right') rightFlipper.targetAngle = active ? 0.6 : -0.6;
        };

        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyZ') handleInput('left', true);
            if (e.code === 'ArrowRight' || e.code === 'KeyM') handleInput('right', true);
        });
        window.addEventListener('keyup', e => { handleInput('left', false); handleInput('right', false); });

        canvas.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            handleInput(touch.clientX < window.innerWidth / 2 ? 'left' : 'right', true);
            e.preventDefault();
        }, {passive: false});
        canvas.addEventListener('touchend', () => { handleInput('left', false); handleInput('right', false); });

        resetBall();
        update();
    </script>
</body>
</html>
