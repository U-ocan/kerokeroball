<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KerokeroBall - Physics Stability Edition</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { background: #87ceeb; border: 4px solid #27ae60; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); max-width: 95vw; max-height: 85vh; }
        #ui { position: absolute; top: 20px; color: white; text-align: center; pointer-events: none; z-index: 10; width: 100%; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0; font-size: 1.2rem;">KerokeroBall</h2>
        <div id="score">Score: 0</div>
        <div id="msg" style="font-size: 0.8rem; margin-top:5px; color: #ffeb3b;">TAP TO ENABLE SOUND</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('msg');

        canvas.width = 360; 
        canvas.height = 660; 

        // --- Web Audio API サウンドシステム ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        const soundBuffers = {};
        const soundAssets = {
            kero: 'https://raw.githubusercontent.com/U-ocan/kerokeroball/main/kero.m4a'
        };

        async function loadSounds() {
            for (const [name, url] of Object.entries(soundAssets)) {
                try {
                    const response = await fetch(url);
                    const arrayBuffer = await response.arrayBuffer();
                    soundBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
                } catch (e) { console.error("Sound load error:", name, e); }
            }
        }

        function playSound(name) {
            if (!soundBuffers[name] || audioCtx.state !== 'running') return;
            const source = audioCtx.createBufferSource();
            source.buffer = soundBuffers[name];
            source.connect(audioCtx.destination);
            source.start(0);
        }

        function unlockAudio() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
                msgEl.style.display = 'none';
            }
        }
        loadSounds();

        // --- 物理パラメータ ---
        const gravity = 0.45; // 重力をわずかに強めて停滞を防ぐ
        const airFriction = 0.99; // 空中摩擦（常に速度を1%削る）
        let score = 0;
        let floatingTexts = [];

        const frogImg = new Image();
        frogImg.crossOrigin = "anonymous"; 
        frogImg.src = 'https://raw.githubusercontent.com/U-ocan/kerokeroball/main/frog.PNG'; 
        let imgLoaded = false;
        frogImg.onload = () => { imgLoaded = true; };

        const ball = { x: 342, y: 560, vx: 0, vy: 0, radius: 14, isLocked: true };

        // 浮遊テキスト描画
        class FloatingText {
            constructor(x, y, text) {
                this.x = x; this.y = y; this.text = text;
                this.life = 1.0; this.vY = -1.2; this.scale = 0.5;
            }
            update() {
                this.y += this.vY;
                this.life -= 0.025;
                if (this.scale < 1.0) this.scale += 0.1;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = "#ffffff";
                ctx.font = `bold ${22 * this.scale}px sans-serif`;
                ctx.textAlign = "center";
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        // フリッパー
        class Flipper {
            constructor(x, y, length, angle, side) {
                this.x = x; this.y = y; this.length = length;
                this.baseAngle = angle; this.angle = angle;
                this.side = side;
                this.targetAngle = angle;
                this.prevAngle = angle;
            }
            update() {
                this.prevAngle = this.angle;
                this.angle += (this.targetAngle - this.angle) * 0.45;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = '#27ae60';
                ctx.beginPath();
                ctx.roundRect(0, -9, this.length * this.side, 18, 9);
                ctx.fill();
                ctx.restore();
            }
        }

        const laneX = 325; 
        const laneExitY = 120; 
        const plunger = {
            y: 585, minY: 585, maxY: 645, 
            isCharging: false, k: 3.8 
        };
        
        const flipY = 560; 
        const leftFlipper = new Flipper(70, flipY, 95, 0.6, 1);
        const rightFlipper = new Flipper(255, flipY, 95, -0.6, -1);

        const bumpers = [
            { x: 80, y: 180, r: 35, scale: 1.0 },
            { x: 240, y: 180, r: 35, scale: 1.0 },
            { x: 160, y: 320, r: 45, scale: 1.0 }
        ];

        const slingTop = flipY - 105;

        function resetBall() {
            ball.x = 342; 
            ball.y = plunger.minY - ball.radius - 2;
            ball.vx = 0; ball.vy = 0;
            ball.isLocked = true; 
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 地面
            ctx.fillStyle = '#218c74';
            ctx.beginPath(); ctx.ellipse(180, 655, 250, 60, 0, 0, Math.PI * 2); ctx.fill();

            // レーン
            ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 8; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(laneX, canvas.height); ctx.lineTo(laneX, laneExitY); ctx.stroke();

            // プランジャー
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(laneX + 5, plunger.y, 25, 12); 
            ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(laneX + 17.5, plunger.y + 12);
            for (let i = 1; i <= 12; i++) {
                ctx.lineTo(laneX + 17.5 + (i % 2 === 0 ? 8 : -8), plunger.y + 12 + (i * (canvas.height - (plunger.y + 12)) / 12));
            }
            ctx.stroke();

            // スリングショット描画
            const slingData = [
                {p1:{x:0, y:slingTop}, p2:{x:70, y:flipY}, p3:{x:0, y:flipY}},
                {p1:{x:laneX-15, y:slingTop}, p2:{x:250, y:flipY}, p3:{x:laneX-15, y:flipY}}
            ];
            slingData.forEach(s => {
                ctx.fillStyle = '#2ecc71'; ctx.beginPath();
                ctx.moveTo(s.p1.x, s.p1.y); ctx.lineTo(s.p2.x, s.p2.y); ctx.lineTo(s.p3.x, s.p3.y); ctx.fill();
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 6; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(s.p1.x, s.p1.y + 5); ctx.lineTo(s.p2.x, s.p2.y - 5); ctx.stroke();
            });

            // バンパー
            bumpers.forEach(b => {
                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.scale(b.scale, b.scale);
                if (imgLoaded) {
                    const size = b.r * 2.2;
                    ctx.drawImage(frogImg, -size/2, -size/2, size, size);
                } else {
                    ctx.fillStyle = '#2ecc71';
                    ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
                b.scale += (1.0 - b.scale) * 0.15;
            });
            
            leftFlipper.draw(); rightFlipper.draw();

            floatingTexts = floatingTexts.filter(t => t.life > 0);
            floatingTexts.forEach(t => { t.update(); t.draw(); });

            // ボール
            ctx.save(); ctx.translate(ball.x, ball.y); ctx.fillStyle = '#FFFFFF';
            ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#000000'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#708090'; ctx.beginPath(); ctx.arc(0, 0, ball.radius * 0.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function update() {
            if (plunger.isCharging) {
                if (plunger.y < plunger.maxY) plunger.y += 3; 
                if (ball.isLocked) ball.y = plunger.y - ball.radius - 2;
            } else {
                if (plunger.y > plunger.minY) {
                    if (ball.isLocked) {
                        const power = (plunger.y - plunger.minY) * plunger.k + 22;
                        ball.vy = -power;
                        ball.isLocked = false;
                    }
                    plunger.y -= 45; 
                } else { plunger.y = plunger.minY; }
            }

            if (!ball.isLocked) {
                ball.vy += gravity;
                ball.x += ball.vx;
                ball.y += ball.vy;
                // 全体的な摩擦を適用（無限ループ防止策1）
                ball.vx *= airFriction;
                ball.vy *= airFriction;
            }

            // 壁反射
            if (ball.x < ball.radius) { ball.vx *= -0.5; ball.x = ball.radius; }
            if (ball.x > canvas.width - ball.radius) { ball.vx *= -0.5; ball.x = canvas.width - ball.radius; }
            if (ball.y < ball.radius) { ball.vy *= -0.4; ball.y = ball.radius; }

            // 通路制御
            if (ball.x > laneX - 10) {
                if (ball.y < laneExitY) {
                    if (ball.vx >= 0) { ball.vx = -8; ball.vy = -4; }
                } else {
                    if (ball.x < laneX + ball.radius) {
                        ball.x = laneX + ball.radius; ball.vx = 0;
                    }
                }
            } else if (ball.y > laneExitY && ball.x > laneX - 25) {
                ball.x = laneX - 25; ball.vx *= -0.5;
            }

            // バンパー衝突
            bumpers.forEach(b => {
                const dx = ball.x - b.x; const dy = ball.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ball.radius + b.r) {
                    const angle = Math.atan2(dy, dx);
                    // 反射に少しランダム性を加える（無限ループ防止策2）
                    const jitter = (Math.random() - 0.5) * 0.1;
                    const bPower = 11.5;
                    ball.vx = Math.cos(angle + jitter) * bPower; 
                    ball.vy = Math.sin(angle + jitter) * bPower;
                    
                    score += 10; scoreEl.innerText = `Score: ${score}`;
                    floatingTexts.push(new FloatingText(b.x, b.y - 20, `+10`));
                    
                    ball.x = b.x + Math.cos(angle) * (ball.radius + b.r + 1);
                    b.scale = 1.3; 
                    playSound('kero');
                }
            });

            // スリングショット（無限ループ対策版）
            const slings = [
                {x1: 0, y1: slingTop, x2: 70, y2: flipY, isLeft: true},
                {x1: laneX - 15, y1: slingTop, x2: 250, y2: flipY, isLeft: false}
            ];
            slings.forEach(s => {
                if (ball.y >= slingTop && ball.y <= flipY) {
                    const progress = (ball.y - slingTop) / (flipY - slingTop);
                    const edgeX = s.isLeft ? (progress * 70) : (laneX - 15 - (progress * 65));
                    const isInside = s.isLeft ? (ball.x - ball.radius < edgeX) : (ball.x + ball.radius > edgeX && ball.x < laneX - 15);
                    
                    if (isInside) {
                        const speed = Math.sqrt(ball.vx**2 + ball.vy**2);
                        // 速度に応じて反発力を変える（無限ループ防止策3）
                        const bouncePower = Math.max(7, speed * 0.85); 
                        // ランダムな角度揺らぎ
                        const angleJitter = (Math.random() - 0.5) * 0.3; 
                        
                        if (s.isLeft) {
                            ball.vx = Math.cos(angleJitter) * bouncePower;
                            ball.vy = Math.sin(angleJitter) * bouncePower - 5; // やや上向きに
                        } else {
                            ball.vx = -Math.cos(angleJitter) * bouncePower;
                            ball.vy = Math.sin(angleJitter) * bouncePower - 5;
                        }
                        
                        score += 5; scoreEl.innerText = `Score: ${score}`;
                        floatingTexts.push(new FloatingText(ball.x, ball.y, `+5`));
                        ball.x = s.isLeft ? (edgeX + ball.radius + 2) : (edgeX - ball.radius - 2);
                    }
                }
            });

            // フリッパー衝突
            [leftFlipper, rightFlipper].forEach(f => {
                f.update();
                const dx = ball.x - f.x; const dy = ball.y - f.y;
                const cos = Math.cos(-f.angle); const sin = Math.sin(-f.angle);
                const rx = dx * cos - dy * sin; const ry = dx * sin + dy * cos;
                if (rx * f.side > -5 && rx * f.side < f.length + 5 && Math.abs(ry) < ball.radius + 10) {
                    if (Math.abs(f.angle - f.prevAngle) > 0.02) {
                        const hitPower = 18.5;
                        ball.vx = Math.sin(f.angle) * hitPower * f.side;
                        ball.vy = -Math.cos(f.angle) * hitPower;
                    } else { 
                        ball.vx *= 0.6; ball.vy *= 0.6; // 静止フリッパーでの減衰
                    }
                    const pushY = (ry > 0 ? 1 : -1) * (ball.radius + 11);
                    ball.x = f.x + (rx * Math.cos(f.angle) - pushY * Math.sin(f.angle));
                    ball.y = f.y + (rx * Math.sin(f.angle) + pushY * Math.cos(f.angle));
                }
            });

            // ミス判定
            if (ball.y > canvas.height + 100) {
                score = 0; scoreEl.innerText = `Score: ${score}`;
                resetBall();
            }
            draw();
            requestAnimationFrame(update);
        }

        // 入力処理
        const handleInput = (side, active) => {
            if (active) unlockAudio(); 
            if (side === 'left') leftFlipper.targetAngle = active ? -0.6 : 0.6;
            if (side === 'right') rightFlipper.targetAngle = active ? 0.6 : -0.6;
        };

        window.addEventListener('keydown', e => {
            unlockAudio();
            if (e.code === 'Space') plunger.isCharging = true;
            if (e.code === 'ArrowLeft' || e.code === 'KeyZ') handleInput('left', true);
            if (e.code === 'ArrowRight' || e.code === 'KeyM') handleInput('right', true);
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'Space') plunger.isCharging = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyZ') handleInput('left', false);
            if (e.code === 'ArrowRight' || e.code === 'KeyM') handleInput('right', false);
        });

        canvas.addEventListener('touchstart', e => {
            e.preventDefault(); unlockAudio();
            const rect = canvas.getBoundingClientRect();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const tx = (touch.clientX - rect.left) * (canvas.width / rect.width);
                if (tx > laneX - 40) plunger.isCharging = true;
                else handleInput(touch.clientX < window.innerWidth / 2 ? 'left' : 'right', true);
            }
        }, {passive: false});

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            plunger.isCharging = false;
            handleInput('left', false); handleInput('right', false);
        }, {passive: false});

        resetBall();
        update();
    </script>
</body>
</html>
