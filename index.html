<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KerokeroBall - Natural Physics</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { background: #87ceeb; border: 4px solid #27ae60; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); max-width: 95vw; max-height: 95vh; }
        #ui { position: absolute; top: 20px; color: white; text-align: center; pointer-events: none; z-index: 10; width: 100%; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0; font-size: 1.2rem;">KerokeroBall</h2>
        <div id="score">Score: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = 360; 
        canvas.height = 660; 

        const gravity = 0.42; 
        const decay = 0.85;   
        let score = 0;

        const frogImg = new Image();
        frogImg.crossOrigin = "anonymous"; 
        frogImg.src = 'https://raw.githubusercontent.com/U-ocan/kerokeroball/main/frog.PNG'; 

        let imgLoaded = false;
        frogImg.onload = () => { imgLoaded = true; };

        const ball = {
            x: 180, y: -50, vx: 2, vy: 0, radius: 14, color: '#ffffff'
        };

        class Flipper {
            constructor(x, y, length, angle, side) {
                this.x = x; this.y = y; this.length = length;
                this.baseAngle = angle; this.angle = angle;
                this.side = side;
                this.targetAngle = angle;
                this.prevAngle = angle;
            }
            update() {
                this.prevAngle = this.angle;
                this.angle += (this.targetAngle - this.angle) * 0.45;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = '#27ae60';
                ctx.beginPath();
                ctx.roundRect(0, -10, this.length * this.side, 20, 10);
                ctx.fill();
                ctx.restore();
            }
        }

        const flipY = 560; 
        const leftFlipper = new Flipper(70, flipY, 95, 0.6, 1);
        const rightFlipper = new Flipper(290, flipY, 95, -0.6, -1);

        const bumpers = [
            { x: 90, y: 165, r: 35 },
            { x: 270, y: 165, r: 35 },
            { x: 180, y: 305, r: 45 }
        ];

        const slingTop = flipY - 105;

        function drawFrogBumper(b) {
            if (imgLoaded) {
                const size = b.r * 2.2;
                ctx.drawImage(frogImg, b.x - size/2, b.y - size/2, size, size);
            } else {
                ctx.fillStyle = '#2ecc71';
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
            }
        }

        function resetBall() {
            ball.x = 180; ball.y = -30;
            ball.vx = (Math.random() - 0.5) * 8;
            ball.vy = 2;
        }

        function update() {
            ball.vy += gravity;
            ball.x += ball.vx;
            ball.y += ball.vy;

            // 微小な摩擦
            ball.vx *= 0.995;
            ball.vy *= 0.995;

            // 壁判定
            if (ball.x < ball.radius && ball.y < slingTop) { ball.vx *= -0.6; ball.x = ball.radius; }
            if (ball.x > canvas.width - ball.radius && ball.y < slingTop) { ball.vx *= -0.6; ball.x = canvas.width - ball.radius; }
            if (ball.y < ball.radius && ball.y > -100) { ball.vy *= -0.6; ball.y = ball.radius; }

            // バンパー
            bumpers.forEach(b => {
                const dx = ball.x - b.x; const dy = ball.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ball.radius + b.r) {
                    const angle = Math.atan2(dy, dx);
                    const speed = Math.sqrt(ball.vx**2 + ball.vy**2);
                    const newSpeed = Math.max(speed * decay, 9); 
                    ball.vx = Math.cos(angle) * newSpeed;
                    ball.vy = Math.sin(angle) * newSpeed;
                    score += 10; scoreEl.innerText = `Score: ${score}`;
                }
            });

            // スリングショット
            const slingshots = [{isLeft:true, x:0}, {isLeft:false, x:360}];
            slingshots.forEach(s => {
                if (ball.y >= slingTop && ball.y <= flipY) {
                    const progress = (ball.y - slingTop) / (flipY - slingTop);
                    const slopeX = s.isLeft ? (progress * 70) : 360 - (progress * 70);
                    if (s.isLeft && ball.x - ball.radius < slopeX) {
                        ball.vx = 8; ball.vy = -4; ball.x = slopeX + ball.radius;
                        score += 5;
                    } else if (!s.isLeft && ball.x + ball.radius > slopeX) {
                        ball.vx = -8; ball.vy = -4; ball.x = slopeX - ball.radius;
                        score += 5;
                    }
                    scoreEl.innerText = `Score: ${score}`;
                }
            });

            // フリッパー新物理
            [leftFlipper, rightFlipper].forEach(f => {
                f.update();
                const dx = ball.x - f.x;
                const dy = ball.y - f.y;
                const cos = Math.cos(-f.angle);
                const sin = Math.sin(-f.angle);
                const rx = dx * cos - dy * sin;
                const ry = dx * sin + dy * cos;

                const isFlipping = Math.abs(f.angle - f.prevAngle) > 0.005;

                // 判定エリアの調整
                if (rx * f.side > -5 && rx * f.side < f.length + 5 && Math.abs(ry) < ball.radius + 10) {
                    if (isFlipping) {
                        // 打撃中：強く弾く
                        const power = 18;
                        ball.vy = -power * Math.cos(f.angle);
                        ball.vx = power * Math.sin(f.angle) * f.side + (ball.x - f.x) * 0.1;
                        ball.y = f.y + (ry > 0 ? 25 : -25);
                    } else {
                        // 静止中：斜面として振る舞う
                        const friction = 0.92;
                        ball.vx *= friction;
                        ball.vy *= friction;

                        // 斜面に沿った転がり（重力の分解）
                        const slideForce = 0.4;
                        // フリッパーの角度に応じてボールを動かす。上げている時は根元(x減少)へ、下げている時は先端(x増加)へ。
                        ball.vx += Math.cos(f.angle) * slideForce * f.side;
                        ball.vy += Math.sin(f.angle) * slideForce;

                        // 押し出し（埋まり防止）
                        const targetRy = (ry > 0 ? 1 : -1) * (ball.radius + 5);
                        const diffY = targetRy - ry;
                        ball.x += diffY * -sin;
                        ball.y += diffY * cos;
                    }
                }
            });

            if (ball.y > canvas.height + 100) {
                score = 0; scoreEl.innerText = `Score: ${score}`;
                resetBall();
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#218c74';
            ctx.beginPath(); ctx.ellipse(180, 655, 250, 60, 0, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#27ae60';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            [ {p1:{x:0, y:slingTop}, p2:{x:70, y:flipY}, p3:{x:0, y:flipY}},
              {p1:{x:360, y:slingTop}, p2:{x:290, y:flipY}, p3:{x:360, y:flipY}}
            ].forEach(s => {
                ctx.beginPath(); ctx.moveTo(s.p1.x, s.p1.y); ctx.lineTo(s.p2.x, s.p2.y); ctx.lineTo(s.p3.x, s.p3.y); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo(s.p1.x, s.p1.y); ctx.lineTo(s.p2.x, s.p2.y); ctx.stroke();
            });

            bumpers.forEach(drawFrogBumper);
            leftFlipper.draw();
            rightFlipper.draw();
            
            ctx.fillStyle = ball.color;
            ctx.shadowBlur = 15; ctx.shadowColor = "rgba(255,255,255,0.6)";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        const handleInput = (side, active) => {
            if (side === 'left') leftFlipper.targetAngle = active ? -0.6 : 0.6;
            if (side === 'right') rightFlipper.targetAngle = active ? 0.6 : -0.6;
        };

        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyZ') handleInput('left', true);
            if (e.code === 'ArrowRight' || e.code === 'KeyM') handleInput('right', true);
        });
        window.addEventListener('keyup', e => { handleInput('left', false); handleInput('right', false); });

        canvas.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            handleInput(touch.clientX < window.innerWidth / 2 ? 'left' : 'right', true);
            e.preventDefault();
        }, {passive: false});
        canvas.addEventListener('touchend', () => { handleInput('left', false); handleInput('right', false); });

        resetBall();
        update();
    </script>
</body>
</html>
