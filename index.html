<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frog Pinball</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
  }
  canvas {
    background: #d0f0c0;
    display: block;
  }
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ball, flipper;
let gravity = 0.4;

// 初期化
function init() {
  ball = {
    x: window.innerWidth / 2,
    y: 100,
    vx: 2,
    vy: 0,
    r: 10
  };

  flipper = {
    x: window.innerWidth / 2,
    y: window.innerHeight - 100,
    width: 100,
    height: 15,
    active: false
  };
}

// リサイズ対応
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  if (flipper) {
    flipper.x = canvas.width / 2;
    flipper.y = canvas.height - 100;
  }
}

window.addEventListener("resize", resize);

// 入力（PC）
document.addEventListener("mousedown", () => flipper.active = true);
document.addEventListener("mouseup", () => flipper.active = false);

// 入力（スマホ）
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  flipper.active = true;
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  flipper.active = false;
});

// 更新
function update() {
  ball.vy += gravity;
  ball.x += ball.vx;
  ball.y += ball.vy;

  // 壁
  if (ball.x < ball.r || ball.x > canvas.width - ball.r) {
    ball.vx *= -1;
  }
  if (ball.y < ball.r) {
    ball.vy *= -1;
  }

  // フリッパー
  if (
    ball.y + ball.r > flipper.y &&
    ball.x > flipper.x - flipper.width / 2 &&
    ball.x < flipper.x + flipper.width / 2 &&
    ball.vy > 0
  ) {
    ball.vy = -10;
  }

  // 落下リセット
  if (ball.y > canvas.height) {
    ball.x = canvas.width / 2;
    ball.y = 100;
    ball.vx = 2;
    ball.vy = 0;
  }
}

// 描画
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ボール
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = "#000";
  ctx.fill();

  // フリッパー（押すと色変化）
  ctx.fillStyle = flipper.active ? "#ff6666" : "#333";
  ctx.fillRect(
    flipper.x - flipper.width / 2,
    flipper.y,
    flipper.width,
    flipper.height
  );
}

// ループ
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// 実行順（重要）
init();
resize();
loop();
</script>

</body>
</html>
