<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frog Pinball</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
  }
  canvas {
    background: #d0f0c0;
    display: block;
  }
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ball;
let flipper;

const gravity = 0.3;
const flipperPower = -12;

// 初期化
function init() {
  resize();

  ball = {
    x: canvas.width / 2,
    y: 100,
    vx: 2,
    vy: 0,
    r: 10
  };

  flipper = {
    x: canvas.width / 2,
    baseY: canvas.height - 80,
    upY: canvas.height - 140,
    y: canvas.height - 80,
    width: 120,
    height: 15,
    active: false
  };
}

// リサイズ
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", () => {
  resize();
  init();
});

// 入力（PC）
document.addEventListener("mousedown", () => flipper.active = true);
document.addEventListener("mouseup", () => flipper.active = false);

// スペースキー
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") flipper.active = true;
});
document.addEventListener("keyup", (e) => {
  if (e.code === "Space") flipper.active = false;
});

// スマホ
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  flipper.active = true;
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  flipper.active = false;
});

// 更新
function update() {

  // フリッパー上下
  flipper.y = flipper.active ? flipper.upY : flipper.baseY;

  // ボール物理
  ball.vy += gravity;
  ball.x += ball.vx;
  ball.y += ball.vy;

  // 壁
  if (ball.x < ball.r || ball.x > canvas.width - ball.r) {
    ball.vx *= -1;
  }
  if (ball.y < ball.r) {
    ball.vy *= -1;
  }

  // フリッパー当たり判定（改良版）
  if (
    ball.y + ball.r > flipper.y &&
    ball.y - ball.r < flipper.y + flipper.height &&
    ball.x > flipper.x - flipper.width / 2 &&
    ball.x < flipper.x + flipper.width / 2 &&
    ball.vy > 0
  ) {
    ball.vy = flipper.active ? flipperPower : -4;
    ball.y = flipper.y - ball.r; // めり込み防止
  }

  // 落下リセット
  if (ball.y > canvas.height) {
    ball.x = canvas.width / 2;
    ball.y = 100;
    ball.vx = 2;
    ball.vy = 0;
  }
}

// 描画
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ボール
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = "#000";
  ctx.fill();

  // フリッパー
  ctx.fillStyle = flipper.active ? "#ff6666" : "#333";
  ctx.fillRect(
    flipper.x - flipper.width / 2,
    flipper.y,
    flipper.width,
    flipper.height
  );
}

// ループ
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// 実行
init();
loop();
</script>

</body>
</html>
