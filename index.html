<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KerokeroBall</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { background: #87ceeb; border: 4px solid #27ae60; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); max-width: 95vw; max-height: 85vh; margin-top: 30px; }
        #ui { position: absolute; top: 45px; color: white; text-align: center; pointer-events: none; z-index: 10; width: 100%; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0; font-size: 1.2rem;">KerokeroBall</h2>
        <div id="score">Score: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = 360; 
        canvas.height = 660; 

        const gravity = 0.42; 
        let score = 0;

        const frogImg = new Image();
        frogImg.crossOrigin = "anonymous"; 
        frogImg.src = 'https://raw.githubusercontent.com/U-ocan/kerokeroball/main/frog.PNG'; 

        let imgLoaded = false;
        frogImg.onload = () => { imgLoaded = true; };

        // ボール初期設定（最初は画面中央より少し上に配置）
        const ball = {
            x: 180, y: 50, vx: 0, vy: 0, radius: 16
        };

        class Flipper {
            constructor(x, y, length, angle, side) {
                this.x = x; this.y = y; this.length = length;
                this.baseAngle = angle; this.angle = angle;
                this.side = side;
                this.targetAngle = angle;
                this.prevAngle = angle;
            }
            update() {
                this.prevAngle = this.angle;
                this.angle += (this.targetAngle - this.angle) * 0.45;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = '#27ae60';
                ctx.beginPath();
                ctx.roundRect(0, -8, this.length * this.side, 16, 8);
                ctx.fill();
                ctx.restore();
            }
        }
// --- プランジャー・レーン設定 ---
const laneX = 330; // レーンの左側の壁のX座標
const plunger = {
    y: 600, 
    minY: 600, 
    maxY: 640, 
    isCharging: false, 
    power: 0,
    k: 0.28 // バネの強さ（やや弱め）
};

// 既存の変数（この付近に挿入してください）
        
        const flipY = 560; 
        const leftFlipper = new Flipper(70, flipY, 95, 0.6, 1);
        // 右側のギミックをレーン(laneX=330)にぶつからない位置まで左へ寄せる
const rightFlipper = new Flipper(260, flipY, 95, -0.6, -1); // 290から260へ

        const bumpers = [
            { x: 90, y: 165, r: 35 },
            { x: 270, y: 165, r: 35 },
            { x: 180, y: 305, r: 45 }
        ];

        const slingTop = flipY - 105;

        function drawFrogBumper(b) {
            if (imgLoaded) {
                const size = b.r * 2.2;
                ctx.drawImage(frogImg, b.x - size/2, b.y - size/2, size, size);
            } else {
                ctx.fillStyle = '#2ecc71';
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
            }
        }

        function resetBall() {
    ball.x = 345; // レーンの中央（laneX:330 + 余白）
    ball.y = 540; // プランジャー(600)の十分上
    ball.vx = 0;
    ball.vy = 0;
}

            function update() {
            // --- プランジャーのチャージ＆発射ロジック ---
            // update() 内のプランジャー部分をこれに差し替え
if (plunger.isCharging) {
    if (plunger.y < plunger.maxY) plunger.y += 1.5; 
} else {
    if (plunger.y > plunger.minY) {
        // 発射判定：ボールがレーン内にあり、かつプランジャーの「板のすぐ上」にいる時のみ
        if (ball.x > laneX && ball.y > plunger.y - 45 && ball.y < plunger.y) {
            ball.vy = -(plunger.y - plunger.minY) * plunger.k * 3.5;
            ball.y = plunger.y - ball.radius - 5; // めり込み防止：板の少し上に強制移動
        }
        plunger.y -= 15; 
    } else {
        plunger.y = plunger.minY;
    }
}

            // 以下、既存の物理計算
            ball.vy += gravity;
            ball.x += ball.vx;
            ball.y += ball.vy;

            ball.vx *= 0.995;
            ball.vy *= 0.995;

            // 壁
            if (ball.x < ball.radius) { ball.vx *= -0.5; ball.x = ball.radius; }
            if (ball.x > canvas.width - ball.radius) { ball.vx *= -0.5; ball.x = canvas.width - ball.radius; }
            if (ball.y < ball.radius) { ball.vy *= -0.5; ball.y = ball.radius; }
// --- 右レーン隔離ロジック（完全版） ---
// ボールがレーン内（x > laneX）にいる時の処理を独立させる
if (ball.x > laneX - ball.radius) {
    // 1. 出口(y=100)より下にいる間は、絶対に左(laneX)へ行かせない
    if (ball.y > 100) {
        if (ball.x < laneX + ball.radius) {
            ball.x = laneX + ball.radius; // 位置を強制固定
            if (ball.vx < 0) ball.vx = 0; // 左への速度を殺す
        }
    }
    
    // 2. 底抜け防止（プランジャーより下に行かないようにする）
    if (ball.y > plunger.minY - ball.radius) {
        ball.y = plunger.minY - ball.radius;
        ball.vy = 0;
    }
}
                
            // バンパー
            bumpers.forEach(b => {
                const dx = ball.x - b.x; const dy = ball.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ball.radius + b.r) {
                    const angle = Math.atan2(dy, dx);
                    ball.vx = Math.cos(angle) * 11;
                    ball.vy = Math.sin(angle) * 11;
                    score += 10; scoreEl.innerText = `Score: ${score}`;
                    // 埋まり込み防止
                    ball.x = b.x + Math.cos(angle) * (ball.radius + b.r + 2);
                    ball.y = b.y + Math.sin(angle) * (ball.radius + b.r + 2);
                }
            });

            // --- スリングショット判定ロジック：脱出強化版 ---
            const slingshots = [{isLeft:true}, {isLeft:false}];
            slingshots.forEach(s => {
                if (ball.y >= slingTop - 10 && ball.y <= flipY + 5) {
                    const progress = (ball.y - slingTop) / (flipY - slingTop);
                    // 【修正1】右側の基準を 360(端) から 330(仕切り) に変更
        const slopeX = s.isLeft ? (progress * 70) : 330 - (progress * 70);
                    
                    if (s.isLeft && ball.x - ball.radius < slopeX) {
                        // 左側：右斜め「上」へ強く弾く
                        ball.vx = 4 + Math.random() * 3;  // 横は少し弱めに
                        ball.vy = -10 - Math.random() * 4; // 上への力を大幅強化（脱出優先）
                        ball.x = slopeX + ball.radius + 2; 
                        score += 5;
                   // 【修正2】判定条件に「ball.x < 330」を追加（レーンの中では判定させない）
        else if (!s.isLeft && ball.x + ball.radius > slopeX && ball.x < 330) {
                        // 右側：左斜め「上」へ強く弾く
                        ball.vx = -4 - Math.random() * 3; // 横は少し弱めに
                        ball.vy = -10 - Math.random() * 4; // 上への力を大幅強化
                        ball.x = slopeX - ball.radius - 2;
                        score += 5;
                    }
                    scoreEl.innerText = `Score: ${score}`;
                }
            });

            // フリッパー
            [leftFlipper, rightFlipper].forEach(f => {
                f.update();
                const dx = ball.x - f.x; const dy = ball.y - f.y;
                const cos = Math.cos(-f.angle); const sin = Math.sin(-f.angle);
                const rx = dx * cos - dy * sin; const ry = dx * sin + dy * cos;
                const isFlipping = Math.abs(f.angle - f.prevAngle) > 0.005;

                if (rx * f.side > -15 && rx * f.side < f.length + 10 && Math.abs(ry) < ball.radius + 15) {
                    if (isFlipping) {
                        const power = 19;
                        ball.vy = -power * Math.cos(f.angle);
                        ball.vx = power * Math.sin(f.angle) * f.side;
                        ball.y = f.y - 35; 
                    } else {
                        ball.vx *= 0.85; ball.vy *= 0.85;
                        const slide = 0.48;
                        ball.vx += Math.cos(f.angle) * slide * f.side;
                        ball.vy += Math.sin(f.angle) * slide;
                        const targetRy = (ry > 0 ? 1 : -1) * (ball.radius + 10);
                        ball.x += (targetRy - ry) * -sin;
                        ball.y += (targetRy - ry) * cos;
                    }
                }
            });

            if (ball.y > canvas.height + 100) {
                score = 0; scoreEl.innerText = `Score: ${score}`;
                resetBall();
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 下部
            ctx.fillStyle = '#218c74';
            ctx.beginPath(); ctx.ellipse(180, 655, 250, 60, 0, 0, Math.PI * 2); ctx.fill();

// --- ★ここにプランジャーとレーンを追記★ ---
            
            // 1. レーンの内壁（仕切り）の描画
            ctx.strokeStyle = '#27ae60';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(laneX, canvas.height);
            ctx.lineTo(laneX, 100); // y=100まで壁を作る
            ctx.stroke();

            // 2. プランジャー本体（押し板）の描画
            ctx.fillStyle = '#7f8c8d'; // 金属っぽいグレー
            ctx.fillRect(laneX + 5, plunger.y, 25, 12); 

            // 3. バネの描画（ジグザグ線）
            ctx.strokeStyle = '#bdc3c7';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(laneX + 17.5, plunger.y + 12);
            for (let i = 1; i <= 8; i++) {
                // ジグザグに線を引きながら下へ伸ばす
                const springX = laneX + 17.5 + (i % 2 === 0 ? 8 : -8);
                const springY = plunger.y + 12 + (i * (canvas.height - plunger.y) / 8);
                ctx.lineTo(springX, springY);
            }
            ctx.stroke();

            // --- ★追記ここまで★ ---
            
           // --- スリングショット描画（精密調整版） ---
const slingColor = '#2ecc71'; // 黄味を抑えた鮮やかなエメラルドグリーン
const rubberColor = '#ffffff'; 
const rubberWidth = 6;
const cornerRadius = 15;

// draw関数内のスリングショット定義部分
[ 
    {p1:{x:0, y:slingTop}, p2:{x:70, y:flipY}, p3:{x:0, y:flipY}},
    {p1:{x:260, y:slingTop}, p2:{x:260, y:flipY}, p3:{x:330, y:flipY}} // 右側をレーン(330)に合わせる
]
.forEach(s => {
    // 1. 本体（丸角三角形）
    ctx.fillStyle = slingColor;
    ctx.beginPath();
    ctx.moveTo(s.p1.x, s.p1.y + cornerRadius);
    ctx.arcTo(s.p1.x, s.p1.y, s.p2.x, s.p2.y, cornerRadius);
    ctx.arcTo(s.p2.x, s.p2.y, s.p3.x, s.p3.y, cornerRadius);
    ctx.arcTo(s.p3.x, s.p3.y, s.p1.x, s.p1.y, cornerRadius);
    ctx.closePath();
    ctx.fill();

    // 2. 白いゴム（上下でオフセットを変えて短縮）
    ctx.strokeStyle = rubberColor;
    ctx.lineWidth = rubberWidth;
    ctx.lineCap = 'round';

    const dx = s.p2.x - s.p1.x;
    const dy = s.p2.y - s.p1.y;
    const len = Math.sqrt(dx * dx + dy * dy);

    if (len > cornerRadius * 3) {
        // オフセットの個別設定
        const topOffset = cornerRadius * 1.8;    // 上部は大幅に削って短く
        const bottomOffset = cornerRadius * 1.2; // 下部は適度に削る
        
        const startX = s.p1.x + (dx / len) * topOffset;
        const startY = s.p1.y + (dy / len) * topOffset;
        const endX = s.p2.x - (dx / len) * bottomOffset;
        const endY = s.p2.y - (dy / len) * bottomOffset;

        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
    }
});

            bumpers.forEach(drawFrogBumper);
            leftFlipper.draw();
            rightFlipper.draw();
            
            // --- カエルのたまごボール描画 ---
            ctx.save();
            ctx.translate(ball.x, ball.y);
            // ぷるぷる外殻
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI * 2); ctx.fill();
            // 輪郭
            ctx.strokeStyle = '#4a4a4a'; ctx.lineWidth = 2; ctx.stroke();
            // 芯（黒目）
            ctx.fillStyle = '#708090';
            ctx.beginPath(); ctx.arc(0, 0, ball.radius * 0.5, 0, Math.PI * 2); ctx.fill();
            // 光沢
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(-ball.radius * 0.3, -ball.radius * 0.3, ball.radius * 0.15, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        // --- フリッパー操作ロジック：同時押し対応版 ---
        const handleInput = (side, active) => {
            if (side === 'left') {
                leftFlipper.targetAngle = active ? -0.6 : 0.6;
            }
            if (side === 'right') {
                rightFlipper.targetAngle = active ? 0.6 : -0.6;
            }
        };

        // キーボード操作
        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyZ') handleInput('left', true);
            if (e.code === 'ArrowRight' || e.code === 'KeyM') handleInput('right', true);
        });

        window.addEventListener('keyup', e => {
            // 離したキーに応じて、対応するフリッパーだけを下げる
            if (e.code === 'ArrowLeft' || e.code === 'KeyZ') handleInput('left', false);
            if (e.code === 'ArrowRight' || e.code === 'KeyM') handleInput('right', false);
        });

        // キーボード操作
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') plunger.isCharging = true; // 追加
            if (e.code === 'ArrowLeft' || e.code === 'KeyZ') handleInput('left', true);
            if (e.code === 'ArrowRight' || e.code === 'KeyM') handleInput('right', true);
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'Space') plunger.isCharging = false; // 追加
            if (e.code === 'ArrowLeft' || e.code === 'KeyZ') handleInput('left', false);
            if (e.code === 'ArrowRight' || e.code === 'KeyM') handleInput('right', false);
        });

        // タッチ操作（マルチタッチ対応）
       canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
        const touch = e.changedTouches[i];
        const rect = canvas.getBoundingClientRect();
        const touchX = (touch.clientX - rect.left) * (canvas.width / rect.width);
        const touchY = (touch.clientY - rect.top) * (canvas.height / rect.height);

        // 右下（プランジャー付近）をタップした場合はプランジャーをチャージ
        if (touchX > laneX && touchY > 500) {
            plunger.isCharging = true;
        } else {
            const side = touch.clientX < window.innerWidth / 2 ? 'left' : 'right';
            handleInput(side, true);
        }
    }
}, {passive: false});

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    // 全ての指が離れたらプランジャーのチャージを解除
    if (e.touches.length === 0) {
        plunger.isCharging = false;
    }
    // フリッパーの判定（既存のロジック）
    let leftActive = false;
    let rightActive = false;
    for (let i = 0; i < e.touches.length; i++) {
        if (e.touches[i].clientX < window.innerWidth / 2) leftActive = true;
        else rightActive = true;
    }
    if (!leftActive) handleInput('left', false);
    if (!rightActive) handleInput('right', false);
}, {passive: false});
        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) { handleInput('left', false); handleInput('right', false); }
        });

        resetBall();
        update();
    </script>
</body>
</html>
