<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KerokeroBall - High Power</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        canvas { background: #87ceeb; border: 8px solid #27ae60; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); max-width: 100%; max-height: 90vh; }
        #ui { position: absolute; top: 20px; color: white; text-align: center; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="margin:0">KerokeroBall</h1>
        <p>パワー復活！スリング角度を調整しました</p>
        <div id="score">Score: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = 400;
        canvas.height = 600;

        const gravity = 0.3; 
        let score = 0;

        const ball = {
            x: 200, y: -50, vx: 2, vy: 0, radius: 15, color: '#ffffff'
        };

        class Flipper {
            constructor(x, y, length, angle, side) {
                this.x = x; this.y = y; this.length = length;
                this.baseAngle = angle; this.angle = angle;
                this.side = side;
                this.targetAngle = angle;
            }
            update() {
                this.angle += (this.targetAngle - this.angle) * 0.5;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = '#27ae60';
                ctx.beginPath();
                ctx.roundRect(0, -10, this.length * this.side, 20, 10);
                ctx.fill();
                ctx.restore();
            }
        }

        const leftFlipper = new Flipper(80, 540, 100, 0.5, 1);
        const rightFlipper = new Flipper(320, 540, 100, -0.5, -1);

        const bumpers = [
            { x: 100, y: 150, r: 35 },
            { x: 300, y: 150, r: 35 },
            { x: 200, y: 280, r: 45 }
        ];

        // 【修正】スリングショットの形状を変更（より鋭角に、内側へ誘導）
        const slingshots = [
            { // 左
                p1: { x: 0, y: 380 },
                p2: { x: 100, y: 480 }, // 先端を少し内側へ
                p3: { x: 0, y: 480 },
                side: 'left'
            },
            { // 右
                p1: { x: 400, y: 380 },
                p2: { x: 300, y: 480 }, // 先端を少し内側へ
                p3: { x: 400, y: 480 },
                side: 'right'
            }
        ];

        function drawFrogBumper(b) {
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(b.x - 15, b.y - 12, 10, 0, Math.PI * 2); ctx.arc(b.x + 15, b.y - 12, 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(b.x - 15, b.y - 12, 5, 0, Math.PI * 2); ctx.arc(b.x + 15, b.y - 12, 5, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(b.x, b.y + 10, 15, 0.2, Math.PI - 0.2); ctx.stroke();
        }

        function resetBall() {
            ball.x = 200;
            ball.y = -30;
            ball.vx = (Math.random() - 0.5) * 10;
            ball.vy = 2;
        }

        function update() {
            ball.vy += gravity;
            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.x < ball.radius) { ball.vx *= -0.8; ball.x = ball.radius; }
            if (ball.x > canvas.width - ball.radius) { ball.vx *= -0.8; ball.x = canvas.width - ball.radius; }
            if (ball.y < ball.radius && ball.y > -100) { ball.vy *= -0.8; ball.y = ball.radius; }

            // 【修正】バンパー反発力を強化（10 -> 12）
            bumpers.forEach(b => {
                const dx = ball.x - b.x;
                const dy = ball.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ball.radius + b.r) {
                    const angle = Math.atan2(dy, dx);
                    ball.vx = Math.cos(angle) * 12;
                    ball.vy = Math.sin(angle) * 12;
                    score += 10;
                    scoreEl.innerText = `Score: ${score}`;
                }
            });

            // スリングショット判定
            slingshots.forEach(s => {
                const isLeft = s.side === 'left';
                const wallX = isLeft ? ball.x - ball.radius : ball.x + ball.radius;
                // 斜め辺への当たり判定を微調整（角度を意識）
                if (ball.y > 380 && ball.y < 480) {
                    const thresholdX = isLeft ? (ball.y - 380) + 0 : 400 - (ball.y - 380);
                    if ((isLeft && wallX < thresholdX) || (!isLeft && wallX > thresholdX)) {
                        ball.vx = isLeft ? 10 : -10;
                        ball.vy = -8; // 少し弱めて、すぐ落ちてくるように
                        score += 5;
                        scoreEl.innerText = `Score: ${score}`;
                    }
                }
            });

            // 【修正】フリッパー弾き力を強化（-15 -> -18）
            [leftFlipper, rightFlipper].forEach(f => {
                f.update();
                const dx = ball.x - f.x;
                const dy = ball.y - f.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < f.length + ball.radius && Math.abs(dy) < 50) {
                    if ((f.side === 1 && ball.x > f.x - 10) || (f.side === -1 && ball.x < f.x + 10)) {
                        if (Math.abs(f.targetAngle - f.angle) > 0.02) {
                            ball.vy = -18; 
                            ball.vx = (ball.x - f.x) * 0.25;
                            ball.y = f.y - 30;
                        } else if (ball.y < f.y) {
                            ball.vy *= -0.5;
                            ball.y = f.y - 15;
                        }
                    }
                }
            });

            if (ball.y > canvas.height + 100) {
                score = 0;
                scoreEl.innerText = `Score: ${score}`;
                resetBall();
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#218c74';
            ctx.beginPath(); ctx.ellipse(200, 590, 280, 70, 0, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#27ae60';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            slingshots.forEach(s => {
                ctx.beginPath();
                ctx.moveTo(s.p1.x, s.p1.y);
                ctx.lineTo(s.p2.x, s.p2.y);
                ctx.lineTo(s.p3.x, s.p3.y);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(s.p1.x, s.p1.y);
                ctx.lineTo(s.p2.x, s.p2.y);
                ctx.stroke();
            });

            bumpers.forEach(drawFrogBumper);
            leftFlipper.draw();
            rightFlipper.draw();
            
            ctx.fillStyle = ball.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(255,255,255,0.6)";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        const handleInput = (side, active) => {
            if (side === 'left') leftFlipper.targetAngle = active ? -0.1 : 0.5;
            if (side === 'right') rightFlipper.targetAngle = active ? 0.1 : -0.5;
        };

        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyZ') handleInput('left', true);
            if (e.code === 'ArrowRight' || e.code === 'KeyM') handleInput('right', true);
        });
        window.addEventListener('keyup', e => { handleInput('left', false); handleInput('right', false); });

        canvas.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            handleInput(touch.clientX < window.innerWidth / 2 ? 'left' : 'right', true);
            e.preventDefault();
        }, {passive: false});
        canvas.addEventListener('touchend', () => { handleInput('left', false); handleInput('right', false); });

        resetBall();
        update();
    </script>
</body>
</html>
